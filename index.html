<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Két Sắt Liên Kết Bảo Mật 🗝️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #020617);
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .pin-dot {
            transition: all 0.2s ease;
        }
        .pin-dot.active {
            background-color: #a855f7;
            transform: scale(1.2);
            box-shadow: 0 0 10px #c084fc;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex items-center justify-center p-4 selection:bg-purple-500 selection:text-white">

    <div id="loadingScreen" class="fixed inset-0 bg-slate-950 flex flex-col items-center justify-center z-50 transition-opacity duration-300">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-purple-500 mb-4"></div>
        <p class="text-slate-400 text-sm animate-pulse">Đang kết nối hệ thống bảo mật...</p>
    </div>

    <div class="w-full max-w-md">

        <div id="lockScreen" class="glass-panel rounded-3xl p-8 shadow-2xl hidden">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-purple-500/10 text-purple-400 text-3xl mb-4 border border-purple-500/20 shadow-inner">
                    <i id="lockIcon" class="fa-solid fa-lock"></i>
                </div>
                <h1 id="lockTitle" class="text-xl font-bold tracking-tight text-slate-100">Xác Thực Mã PIN</h1>
                <p id="lockSubtitle" class="text-xs text-slate-400 mt-1">Nhập mã PIN để truy cập két sắt liên kết</p>
            </div>

            <div class="flex justify-center gap-4 mb-8">
                <span class="pin-dot w-4 h-4 rounded-full border border-slate-600 bg-slate-800"></span>
                <span class="pin-dot w-4 h-4 rounded-full border border-slate-600 bg-slate-800"></span>
                <span class="pin-dot w-4 h-4 rounded-full border border-slate-600 bg-slate-800"></span>
                <span class="pin-dot w-4 h-4 rounded-full border border-slate-600 bg-slate-800"></span>
            </div>

            <div class="grid grid-cols-3 gap-4 max-w-[280px] mx-auto mb-4">
                <button onclick="pressKey('1')" class="h-14 w-14 rounded-full bg-slate-800/50 hover:bg-slate-700/50 border border-slate-700/30 text-lg font-semibold transition active:scale-95 focus:outline-none">1</button>
                <button onclick="pressKey('2')" class="h-14 w-14 rounded-full bg-slate-800/50 hover:bg-slate-700/50 border border-slate-700/30 text-lg font-semibold transition active:scale-95 focus:outline-none">2</button>
                <button onclick="pressKey('3')" class="h-14 w-14 rounded-full bg-slate-800/50 hover:bg-slate-700/50 border border-slate-700/30 text-lg font-semibold transition active:scale-95 focus:outline-none">3</button>
                <button onclick="pressKey('4')" class="h-14 w-14 rounded-full bg-slate-800/50 hover:bg-slate-700/50 border border-slate-700/30 text-lg font-semibold transition active:scale-95 focus:outline-none">4</button>
                <button onclick="pressKey('5')" class="h-14 w-14 rounded-full bg-slate-800/50 hover:bg-slate-700/50 border border-slate-700/30 text-lg font-semibold transition active:scale-95 focus:outline-none">5</button>
                <button onclick="pressKey('6')" class="h-14 w-14 rounded-full bg-slate-800/50 hover:bg-slate-700/50 border border-slate-700/30 text-lg font-semibold transition active:scale-95 focus:outline-none">6</button>
                <button onclick="pressKey('7')" class="h-14 w-14 rounded-full bg-slate-800/50 hover:bg-slate-700/50 border border-slate-700/30 text-lg font-semibold transition active:scale-95 focus:outline-none">7</button>
                <button onclick="pressKey('8')" class="h-14 w-14 rounded-full bg-slate-800/50 hover:bg-slate-700/50 border border-slate-700/30 text-lg font-semibold transition active:scale-95 focus:outline-none">8</button>
                <button onclick="pressKey('9')" class="h-14 w-14 rounded-full bg-slate-800/50 hover:bg-slate-700/50 border border-slate-700/30 text-lg font-semibold transition active:scale-95 focus:outline-none">9</button>
                <button onclick="clearPin()" class="h-14 w-14 rounded-full text-slate-400 hover:text-rose-400 text-sm font-medium transition active:scale-95 focus:outline-none">C</button>
                <button onclick="pressKey('0')" class="h-14 w-14 rounded-full bg-slate-800/50 hover:bg-slate-700/50 border border-slate-700/30 text-lg font-semibold transition active:scale-95 focus:outline-none">0</button>
                <button onclick="deleteLast()" class="h-14 w-14 rounded-full text-slate-400 hover:text-amber-400 transition active:scale-95 focus:outline-none">
                    <i class="fa-solid fa-delete-left"></i>
                </button>
            </div>
            
            <p id="errorMsg" class="text-center text-xs text-rose-400 font-medium h-4 mt-2"></p>
        </div>

        <div id="dashboard" class="glass-panel rounded-3xl p-6 shadow-2xl hidden">
            <div class="flex items-center justify-between border-b border-slate-800 pb-4 mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-purple-500/10 border border-purple-500/30 flex items-center justify-center text-purple-400 text-lg">
                        <i class="fa-solid fa-vault"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-slate-100 text-base">Két Sắt Link</h2>
                        <span class="text-[10px] text-purple-400 font-semibold bg-purple-500/10 px-2 py-0.5 rounded-full">Đã bảo mật</span>
                    </div>
                </div>
                <button onclick="lockApp()" class="px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-rose-950/40 hover:text-rose-400 hover:border-rose-500/30 border border-slate-700 text-xs font-medium transition flex items-center gap-1.5">
                    <i class="fa-solid fa-lock text-[10px]"></i> Khóa lại
                </button>
            </div>

            <div class="mb-6 p-4 rounded-xl bg-slate-900/50 border border-slate-800">
                <h3 class="text-xs font-bold text-slate-400 mb-3 tracking-wider uppercase">Thêm Liên Kết Mới</h3>
                <div class="space-y-3">
                    <div>
                        <input type="text" id="linkTitle" placeholder="Tên gợi nhớ (Ví dụ: GitHub của Mạnh, Youtube...)" 
                               class="w-full bg-slate-950 border border-slate-800 focus:border-purple-500/80 focus:ring-1 focus:ring-purple-500/50 rounded-lg px-3 py-2 text-xs text-slate-100 placeholder-slate-500 outline-none transition">
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="linkUrl" placeholder="Đường dẫn URL (Ví dụ: https://...)" 
                               class="flex-1 bg-slate-950 border border-slate-800 focus:border-purple-500/80 focus:ring-1 focus:ring-purple-500/50 rounded-lg px-3 py-2 text-xs text-slate-100 placeholder-slate-500 outline-none transition">
                        <button onclick="saveLink()" class="px-4 bg-purple-600 hover:bg-purple-500 active:scale-95 text-white text-xs font-semibold rounded-lg transition shadow-lg shadow-purple-500/20 flex items-center justify-center gap-1">
                            <i class="fa-solid fa-plus"></i> Lưu
                        </button>
                    </div>
                </div>
            </div>

            <div>
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-xs font-bold text-slate-400 tracking-wider uppercase">Danh Sách Đã Lưu</h3>
                    <span id="linkCount" class="text-[10px] text-slate-500 bg-slate-800 px-2 py-0.5 rounded-full font-bold">0 link</span>
                </div>

                <div id="linksContainer" class="space-y-2.5 max-h-[280px] overflow-y-auto pr-1">
                    <div class="text-center py-8 text-slate-500 text-xs">Chưa có liên kết nào được bảo mật.</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 1. Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBtebZ6KlzYO-xoHAh6qfz6duS3cTlyF04",
  authDomain: "nhatky-9acf5.firebaseapp.com",
  projectId: "nhatky-9acf5",
  storageBucket: "nhatky-9acf5.firebasestorage.app",
  messagingSenderId: "508563399846",
  appId: "1:508563399846:web:d5fb08bf1f383ebd340067",
  measurementId: "G-MX3C9T3YTK"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // App States
        let currentPinInput = "";
        let dbPin = null; // Sẽ lấy từ Firestore
        let isFirstTime = false; // Check xem có phải lần đầu đặt PIN không

        // 2. Tự động kiểm tra xem đã có mã PIN được lưu trên Firestore chưa
        async function checkPinStatus() {
            try {
                const doc = await db.collection("settings").doc("security").get();
                if (doc.exists) {
                    dbPin = doc.data().pin;
                    isFirstTime = false;
                    setupLockScreen("Xác Thực Mã PIN", "Nhập mã PIN để truy cập két sắt liên kết", "fa-lock");
                } else {
                    isFirstTime = true;
                    setupLockScreen("Thiết Lập Mã PIN", "Vui lòng đặt mã PIN 4 số lần đầu của bạn", "fa-lock-open");
                }
                // Hide loading screen
                document.getElementById('loadingScreen').classList.add('opacity-0');
                setTimeout(() => document.getElementById('loadingScreen').classList.add('hidden'), 300);
                document.getElementById('lockScreen').classList.remove('hidden');
            } catch (error) {
                console.error("Lỗi khi tải cấu hình PIN: ", error);
                alert("Không thể kết nối với Firestore. Vui lòng kiểm tra lại Rules trong Firebase Console!");
            }
        }

        // Set up UI cho Lock Screen
        function setupLockScreen(title, subtitle, iconClass) {
            document.getElementById("lockTitle").innerText = title;
            document.getElementById("lockSubtitle").innerText = subtitle;
            const icon = document.getElementById("lockIcon");
            icon.className = `fa-solid ${iconClass}`;
        }

        // 3. Xử lý logic nhập phím ảo
        function pressKey(num) {
            if (currentPinInput.length < 4) {
                currentPinInput += num;
                updatePinDots();
                if (currentPinInput.length === 4) {
                    // Chờ một tí cho mượt rồi kiểm tra luôn
                    setTimeout(validatePin, 200);
                }
            }
        }

        function deleteLast() {
            if (currentPinInput.length > 0) {
                currentPinInput = currentPinInput.slice(0, -1);
                updatePinDots();
                document.getElementById("errorMsg").innerText = "";
            }
        }

        function clearPin() {
            currentPinInput = "";
            updatePinDots();
            document.getElementById("errorMsg").innerText = "";
        }

        function updatePinDots() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, index) => {
                if (index < currentPinInput.length) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        // 4. Kiểm tra hoặc Thiết lập mã PIN mới
        async function validatePin() {
            const errorMsg = document.getElementById("errorMsg");
            
            if (isFirstTime) {
                // Đang trong chế độ thiết lập mã PIN lần đầu
                try {
                    await db.collection("settings").doc("security").set({
                        pin: currentPinInput
                    });
                    dbPin = currentPinInput;
                    isFirstTime = false;
                    errorMsg.className = "text-center text-xs text-emerald-400 font-medium h-4 mt-2";
                    errorMsg.innerText = "Đã lưu mã PIN mới thành công!";
                    setTimeout(() => {
                        unlockApp();
                    }, 1000);
                } catch (error) {
                    errorMsg.innerText = "Không thể lưu mã PIN: " + error.message;
                }
            } else {
                // Đang mở khóa bình thường
                if (currentPinInput === dbPin) {
                    unlockApp();
                } else {
                    errorMsg.className = "text-center text-xs text-rose-400 font-medium h-4 mt-2";
                    errorMsg.innerText = "Mã PIN không chính xác. Hãy thử lại!";
                    // Hiệu ứng rung nhẹ chấm đỏ báo lỗi
                    const dots = document.querySelectorAll('.pin-dot');
                    dots.forEach(dot => dot.classList.add('bg-rose-500', 'border-rose-500'));
                    setTimeout(() => {
                        dots.forEach(dot => dot.classList.remove('bg-rose-500', 'border-rose-500'));
                        clearPin();
                    }, 600);
                }
            }
        }

        // 5. Mở khóa và lấy danh sách Link thời gian thực
        function unlockApp() {
            document.getElementById('lockScreen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            clearPin();
            document.getElementById("errorMsg").innerText = "";
            loadLinks();
        }

        function lockApp() {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('lockScreen').classList.remove('hidden');
            setupLockScreen("Xác Thực Mã PIN", "Nhập mã PIN để truy cập két sắt liên kết", "fa-lock");
            clearPin();
        }

        // 6. Lưu Link mới lên Firestore
        async function saveLink() {
            const titleInput = document.getElementById("linkTitle");
            const urlInput = document.getElementById("linkUrl");
            
            let title = titleInput.value.trim();
            let url = urlInput.value.trim();

            if (!title || !url) {
                alert("Vui lòng nhập đầy đủ tên gợi nhớ và đường dẫn URL!");
                return;
            }

            // Chuẩn hóa đường dẫn nếu thiếu http:// hoặc https://
            if (!/^https?:\/\//i.test(url)) {
                url = "https://" + url;
            }

            try {
                await db.collection("links").add({
                    title: title,
                    url: url,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                // Clear input form
                titleInput.value = "";
                urlInput.value = "";
            } catch (error) {
                console.error("Lỗi khi thêm link: ", error);
                alert("Lỗi khi thêm liên kết. Hãy kiểm tra cài đặt Firestore của bạn!");
            }
        }

        // 7. Lắng nghe và hiển thị danh sách Link từ Firestore (Realtime)
        function loadLinks() {
            const container = document.getElementById("linksContainer");
            const linkCount = document.getElementById("linkCount");

            db.collection("links").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
                container.innerHTML = "";
                const docs = snapshot.docs;
                
                linkCount.innerText = `${docs.length} link`;

                if (docs.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-10 text-slate-500 text-xs flex flex-col items-center justify-center gap-2">
                            <i class="fa-regular fa-folder-open text-2xl text-slate-600"></i>
                            <p>Két sắt hiện tại trống trơn!</p>
                        </div>`;
                    return;
                }

                docs.forEach((doc) => {
                    const data = doc.data();
                    const id = doc.id;
                    
                    const card = document.createElement("div");
                    card.className = "flex items-center justify-between p-3 rounded-xl bg-slate-900/40 hover:bg-slate-800/40 border border-slate-800 hover:border-slate-700/60 transition group";
                    card.innerHTML = `
                        <div class="flex-1 min-w-0 pr-4">
                            <h4 class="text-xs font-semibold text-slate-200 truncate group-hover:text-purple-400 transition">${data.title}</h4>
                            <p class="text-[10px] text-slate-500 truncate mt-0.5">${data.url}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <a href="${data.url}" target="_blank" class="w-8 h-8 rounded-lg bg-purple-500/10 hover:bg-purple-600 text-purple-400 hover:text-white flex items-center justify-center text-xs transition border border-purple-500/20">
                                <i class="fa-solid fa-arrow-up-right-from-square"></i>
                            </a>
                            <button onclick="deleteLink('${id}')" class="w-8 h-8 rounded-lg bg-slate-800 hover:bg-rose-950/40 text-slate-500 hover:text-rose-400 flex items-center justify-center text-xs transition border border-slate-700/60 hover:border-rose-500/30">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        // 8. Xóa Link khỏi Firestore
        async function deleteLink(id) {
            if (confirm("Bạn có chắc chắn muốn xóa liên kết này không?")) {
                try {
                    await db.collection("links").doc(id).delete();
                } catch (error) {
                    console.error("Lỗi khi xóa: ", error);
                    alert("Không thể xóa liên kết!");
                }
            }
        }

        // Chạy kiểm tra PIN ngay khi load trang
        window.onload = checkPinStatus;
    </script>
</body>
</html>
